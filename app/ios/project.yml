name: BadmintonFriends
options:
  bundleIdPrefix: com.vegdog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_NAME: BadmintonFriends
    SWIFT_VERSION: 5.10
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_TEAM: ""
targets:
  BadmintonFriends:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Core
      - path: Features
    resources:
      - path: Resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: BadmintonFriends
        CFBundleName: BadmintonFriends
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vegdog.badmintonfriends
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets: []
